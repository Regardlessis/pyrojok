name: Build StunPop

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build with Maven
        run: mvn package

      - name: Upload plugin jar
        uses: actions/upload-artifact@v4
        with:
          name: StunPop-plugin
          path: target/*.jar
